<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Fraud Desk — Demo</title>
<style>
  :root {
    --bg: #0d1422;
    --panel: #141d30;
    --panel-2: #1b2740;
    --ink: #e8eef7;
    --muted: #8295b3;
    --line: #2a3a5a;
    --safe: #2ecc71;
    --safe-d: #1e8e4e;
    --scam: #ff5a5f;
    --scam-d: #c0383c;
    --gold: #ffcf5c;
    --accent: #5ad1ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(1200px 700px at 50% -10%, #16223b 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, "Microsoft YaHei", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100%;
    padding: 16px;
  }

  .app {
    width: 100%; max-width: 560px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(0,0,0,.45);
    overflow: hidden;
    position: relative;
  }

  /* Demo badge (jam compliance) */
  .demo-badge {
    position: absolute; top: 12px; right: -40px;
    background: var(--gold); color: #2a1d00;
    font-weight: 800; font-size: 11px; letter-spacing: .5px;
    padding: 4px 46px; transform: rotate(35deg);
    box-shadow: 0 4px 10px rgba(0,0,0,.3); z-index: 5; white-space: nowrap;
  }

  header.bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    background: var(--panel-2);
  }
  .brand { font-weight: 800; letter-spacing: .3px; }
  .brand span { color: var(--accent); }
  .bar-right { display: flex; align-items: center; gap: 10px; }
  .shift { font-size: 12px; color: var(--muted); }

  .lang { display: flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
  .lang button {
    background: transparent; border: none; color: var(--muted);
    font-size: 12px; font-weight: 800; padding: 4px 10px; cursor: pointer;
  }
  .lang button.on { background: var(--accent); color: #04121a; }

  .stats { display: flex; gap: 10px; padding: 12px 18px; border-bottom: 1px solid var(--line); }
  .stat {
    flex: 1; background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 10px; padding: 8px 10px; text-align: center;
  }
  .stat .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
  .stat .v { font-size: 18px; font-weight: 800; margin-top: 2px; }
  .v.saved { color: var(--safe); }
  .v.lost { color: var(--scam); }

  .progress { height: 4px; background: var(--panel-2); display: flex; }
  .progress i { flex: 1; border-right: 2px solid var(--panel); background: var(--line); }
  .progress i.done { background: var(--accent); }

  main { padding: 18px; }

  .case-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .chan {
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--muted);
  }
  .risk {
    margin-left: auto; font-size: 12px; color: var(--gold);
    border: 1px solid #4a3c12; background: #261f08; padding: 3px 8px; border-radius: 8px;
  }
  .sender { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .sender b { color: var(--ink); }

  .message {
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px; line-height: 1.6;
    font-size: 15px; white-space: pre-wrap; word-break: break-word;
  }
  .message .q { color: var(--muted); font-size: 12px; margin-bottom: 8px; }

  .actions { display: flex; gap: 12px; margin-top: 16px; }
  button.act {
    flex: 1; border: none; border-radius: 12px; padding: 14px;
    font-size: 15px; font-weight: 800; cursor: pointer; color: #08110a;
    transition: transform .06s ease, filter .15s ease;
  }
  button.act:hover { filter: brightness(1.08); }
  button.act:active { transform: translateY(1px); }
  .b-safe { background: var(--safe); }
  .b-scam { background: var(--scam); color: #1a0506; }
  .hint { text-align: center; font-size: 11px; color: var(--muted); margin-top: 10px; }

  .verdict { margin-top: 14px; border-radius: 12px; padding: 14px; border: 1px solid var(--line); }
  .verdict.good { background: #10241a; border-color: var(--safe-d); }
  .verdict.bad  { background: #241011; border-color: var(--scam-d); }
  .verdict h3 { font-size: 15px; margin-bottom: 6px; }
  .verdict.good h3 { color: var(--safe); }
  .verdict.bad h3 { color: var(--scam); }
  .verdict p { font-size: 13px; color: var(--ink); line-height: 1.5; }
  .flags { margin: 10px 0 4px; padding-left: 4px; list-style: none; }
  .flags li { font-size: 13px; color: var(--ink); padding: 3px 0 3px 22px; position: relative; }
  .flags li::before { content: "\2691"; position: absolute; left: 0; color: var(--gold); }
  .verdict .truth { font-size: 12px; color: var(--muted); margin-top: 8px; }

  .screen { padding: 26px 22px; text-align: center; }
  .screen h1 { font-size: 26px; margin-bottom: 6px; }
  .screen h1 span { color: var(--accent); }
  .screen .sub { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 18px; }
  .screen p.body { color: var(--ink); font-size: 14px; line-height: 1.7; margin: 0 auto 18px; max-width: 430px; text-align: left; }
  .cta {
    display: inline-block; border: none; cursor: pointer;
    background: var(--accent); color: #04121a; font-weight: 800;
    padding: 14px 26px; border-radius: 12px; font-size: 15px;
  }

  .report-grid { display: flex; gap: 10px; margin: 14px 0 18px; }
  .report-grid .stat .v { font-size: 22px; }
  .grade { font-size: 46px; font-weight: 900; margin: 6px 0; }

  .locked {
    margin-top: 18px; text-align: left; border: 1px dashed var(--line);
    border-radius: 12px; padding: 14px; background: rgba(255,255,255,.02);
  }
  .locked .t { font-size: 12px; color: var(--gold); font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
  .locked ul { list-style: none; margin-top: 8px; }
  .locked li { font-size: 13px; color: var(--muted); padding: 4px 0 4px 22px; position: relative; }
  .locked li::before { content: "\1F512"; position: absolute; left: 0; font-size: 11px; }
  .locked p { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.6; }

  footer.foot {
    padding: 12px 18px; border-top: 1px solid var(--line);
    font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6;
  }
  footer.foot b { color: var(--muted); }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="app">
    <div class="demo-badge" data-i18n="demoBadge">THIS IS A DEMO</div>

    <header class="bar">
      <div class="brand">THE FRAUD <span>DESK</span></div>
      <div class="bar-right">
        <div class="lang" id="langToggle">
          <button data-lang="en">EN</button>
          <button data-lang="zh">中</button>
        </div>
        <div class="shift" id="shiftLabel" data-i18n="shift">Night Shift · Training</div>
      </div>
    </header>

    <div class="stats" id="statsRow">
      <div class="stat"><div class="k" data-i18n="saved">Saved</div><div class="v saved" id="statSaved">$0</div></div>
      <div class="stat"><div class="k" data-i18n="lost">Lost</div><div class="v lost" id="statLost">$0</div></div>
      <div class="stat"><div class="k" data-i18n="callsRight">Calls right</div><div class="v" id="statAcc">0/0</div></div>
    </div>
    <div class="progress" id="progress"></div>

    <!-- Intro -->
    <section class="screen" id="introScreen">
      <h1 data-i18n-html="introTitle">The Fraud <span>Desk</span></h1>
      <p class="sub" data-i18n-html="introSub">Every day, scammers steal billions.<br/>Tonight, you're the last line of defense.</p>
      <p class="body" data-i18n-html="introBody"></p>
      <button class="cta" id="startBtn" data-i18n="startBtn">Start your shift →</button>
      <div class="locked" style="margin-top:22px">
        <div class="t" data-i18n="introLockTitle">Demo build · 1 of 8 shifts</div>
        <p data-i18n="introLockBody"></p>
      </div>
    </section>

    <!-- Case -->
    <main id="caseScreen" class="hidden">
      <div class="case-meta">
        <span class="chan" id="caseChan"></span>
        <span class="risk" id="caseRisk"></span>
      </div>
      <div class="sender" id="caseSender"></div>
      <div class="message" id="caseMessage"></div>

      <div class="actions" id="caseActions">
        <button class="act b-safe" data-choice="safe" data-i18n="btnSafe">SAFE — let it through</button>
        <button class="act b-scam" data-choice="scam" data-i18n="btnScam">SCAM — block it</button>
      </div>
      <div class="hint" id="caseHint" data-i18n="hint"></div>

      <div id="verdictBox"></div>
    </main>

    <!-- Report -->
    <section class="screen hidden" id="reportScreen">
      <div class="shift" style="margin-bottom:6px" data-i18n="reportTitle">SHIFT REPORT</div>
      <div class="grade" id="grade">B</div>
      <p class="sub" id="gradeLine"></p>
      <div class="report-grid">
        <div class="stat"><div class="k" data-i18n="moneySaved">Money saved</div><div class="v saved" id="rSaved">$0</div></div>
        <div class="stat"><div class="k" data-i18n="moneyLost">Money lost</div><div class="v lost" id="rLost">$0</div></div>
        <div class="stat"><div class="k" data-i18n="accuracy">Accuracy</div><div class="v" id="rAcc">0/0</div></div>
      </div>

      <div class="locked">
        <div class="t" data-i18n="lockTitle">Locked — full game</div>
        <ul>
          <li data-i18n="lockItem1"></li>
          <li data-i18n="lockItem2"></li>
          <li data-i18n="lockItem3"></li>
          <li data-i18n="lockItem4"></li>
        </ul>
        <p data-i18n="mission"></p>
      </div>

      <div style="margin-top:18px">
        <button class="cta" id="replayBtn" data-i18n="replay">Replay shift</button>
      </div>
    </section>

    <footer class="foot" data-i18n-html="footer"></footer>
  </div>

      en: `Hi, stuck in an investor meeting, can't talk. I need a quick favor —
buy 5 × $300 gift cards for a client reward and send me the codes.

Keep this between us for now, I'll approve the reimbursement after.
You're a lifesaver 🙏`,
      zh: `在,正开投资人会议,不方便打电话。帮我个急忙——
买 5 张 300 元的礼品卡做客户答谢,把卡密发我。

先别跟别人说,回头我批报销。太谢谢你了 🙏`,
    },
    flags: [
      { en: "Authority + urgency + secrecy — the three-part pressure of a “CEO fraud”.",
        zh: "权威 + 紧迫 + 保密——「冒充领导」骗局的三重施压。" },
      { en: "Payment in gift card codes: untraceable, irreversible, never a real business process.",
        zh: "用礼品卡卡密付款:无法追踪、无法撤回,绝非真实的公司流程。" },
      { en: "“New account” + can't-talk-now conveniently blocks you from verifying by voice.",
        zh: "「新账号」+「现在不方便打电话」,刚好堵死你电话核实的路。" },
    ],
    truthScam: { en: "Business-impersonation (BEC) scam. The real fix: call the boss on a known number.",
                 zh: "冒充高管(BEC)骗局。正确做法:用已知号码打给老板核实。" },
    truthSafe: { en: "This was a scam — confidential gift-card requests are almost always fraud.",
                 zh: "这是骗局——要求保密的礼品卡请求,几乎都是诈骗。" },
  },
  {
    answer: "safe", risk: 2000,
    chan: { en: "Phone call (transcript)", zh: "来电(通话记录)" },
    sender: {
      en: "From: the number printed on the back of the customer's own card",
      zh: "来自:客户自己卡片背面印着的那个号码",
    },
    text: {
      en: `“This is NorthBank's fraud team. We blocked a $2,000 charge we think wasn't you.
We will NEVER ask for your PIN or one-time code.

Please don't read any codes to anyone. To continue, hang up and call us
back using the number on the back of your card.”`,
      zh: `「这里是北岸银行反诈团队。我们拦下了一笔 ¥2,000 的扣款,怀疑不是您本人。
我们绝不会向您索要密码或一次性验证码。

请不要把任何验证码读给任何人。如需继续,请挂断,
用您卡片背面的号码回拨我们。」`,
    },
    flags: [
      { en: "It explicitly says it will never ask for your code — the opposite of a scammer.",
        zh: "它明确说绝不会要你的验证码——和骗子恰恰相反。" },
      { en: "No link, no pressure to pay; it tells you to call back on the official number.",
        zh: "没有链接、不催你付款;还让你用官方号码回拨。" },
      { en: "“Hang up and call the number on your card” is exactly the safe behavior to teach.",
        zh: "「挂断,用卡背号码回拨」正是该养成的安全习惯。" },
    ],
    truthScam: { en: "This was genuine — over-blocking means a real fraud alert gets ignored next time.",
                 zh: "这是真的——过度拦截,意味着下次真正的反诈提醒会被忽视。" },
    truthSafe: { en: "Correct. The tell of a real bank: it tells you to verify them on official channels.",
                 zh: "正确。真银行的标志:它让你通过官方渠道去核实它自己。" },
  },
];

const state = { i: 0, saved: 0, lost: 0, correct: 0, answered: 0, decided: false, lastChoice: null };
let lang = localStorage.getItem("fd_lang") || ((navigator.language || "en").toLowerCase().startsWith("zh") ? "zh" : "en");
let screenName = "intro";

const $ = (id) => document.getElementById(id);
const T = (k) => L[lang][k];
const tc = (o) => o[lang];
const money = (n) =>
  (lang === "zh" ? "¥" : "$") + n.toLocaleString(lang === "zh" ? "zh-CN" : "en-US");

function applyLang() {
  document.documentElement.lang = lang;
  localStorage.setItem("fd_lang", lang);
  document.querySelectorAll("#langToggle button").forEach((b) =>
    b.classList.toggle("on", b.dataset.lang === lang));
  document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = T(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach((el) => { el.innerHTML = T(el.dataset.i18nHtml); });
  syncStats();
  if (screenName === "case") { state.decided ? renderVerdict() : renderCase(); }
  else if (screenName === "report") { renderReport(); }
}

function buildProgress() {
  const p = $("progress");
  p.innerHTML = "";
  CASES.forEach((_, idx) => {
    const i = document.createElement("i");
    if (idx < state.i) i.className = "done";
    p.appendChild(i);
  });
}

function syncStats() {
  $("statSaved").textContent = money(state.saved);
  $("statLost").textContent = money(state.lost);
  $("statAcc").textContent = `${state.correct}/${state.answered}`;
}

function show(screen) {
  ["introScreen", "caseScreen", "reportScreen"].forEach((s) => $(s).classList.add("hidden"));
  $(screen).classList.remove("hidden");
  screenName = screen === "introScreen" ? "intro" : screen === "caseScreen" ? "case" : "report";
  const onShift = screen !== "introScreen";
  $("statsRow").style.display = onShift ? "flex" : "none";
  $("progress").style.display = onShift ? "flex" : "none";
}

function renderCase() {
  state.decided = false;
  const c = CASES[state.i];
  $("caseChan").textContent = tc(c.chan);
  $("caseRisk").textContent = c.risk > 0 ? T("riskPrefix") + money(c.risk) : T("routine");
  $("caseSender").innerHTML = tc(c.sender);
  $("caseMessage").innerHTML = `<div class="q">${T("caseQ")}</div>` + tc(c.text);
  $("caseActions").classList.remove("hidden");
  $("caseHint").classList.remove("hidden");
  $("verdictBox").innerHTML = "";
  buildProgress();
  syncStats();
  show("caseScreen");
}

function decide(choice) {
  if (state.decided) return;
  const c = CASES[state.i];
  const right = choice === c.answer;
  state.answered++;
  if (right) state.correct++;
  if (c.answer === "scam") { right ? (state.saved += c.risk) : (state.lost += c.risk); }
  state.decided = true;
  state.lastChoice = choice;
  syncStats();
  renderVerdict();
}

function renderVerdict() {
  const c = CASES[state.i];
  const choice = state.lastChoice;
  const right = choice === c.answer;

  $("caseActions").classList.add("hidden");
  $("caseHint").classList.add("hidden");

  const heading = right
    ? (c.answer === "scam" ? T("vBlocked") : T("vCleared"))
    : (c.answer === "scam" ? T("vLetThrough") : T("vFalseAlarm"));
  const truth = tc(c.answer === "scam" ? c.truthScam : c.truthSafe);
  const flags = c.flags.map((f) => `<li>${tc(f)}</li>`).join("");
  const last = state.i === CASES.length - 1;

  $("verdictBox").innerHTML = `
    <div class="verdict ${right ? "good" : "bad"}">
      <h3>${heading}</h3>
      <p><b>${T("whatToLook")}</b></p>
      <ul class="flags">${flags}</ul>
      <div class="truth">${truth}</div>
    </div>
    <div class="actions">
      <button class="cta" id="nextBtn" style="flex:1">${last ? T("seeReport") : T("next")}</button>
    </div>`;

  $("nextBtn").onclick = () => {
    if (last) { renderReport(); }
    else { state.i++; renderCase(); }
  };
}

function renderReport() {
  state.i = CASES.length;
  buildProgress();
  syncStats();
  $("rSaved").textContent = money(state.saved);
  $("rLost").textContent = money(state.lost);
  $("rAcc").textContent = `${state.correct}/${state.answered}`;

  const pct = state.answered ? state.correct / state.answered : 0;
  let grade = "C", lineKey = "gC";
  if (pct === 1) { grade = "S"; lineKey = "gS"; }
  else if (pct >= 0.8) { grade = "A"; lineKey = "gA"; }
  else if (pct >= 0.6) { grade = "B"; lineKey = "gB"; }
  $("grade").textContent = grade;
  $("gradeLine").textContent = T(lineKey);
  show("reportScreen");
}

// Wire up
$("langToggle").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-lang]");
  if (b && b.dataset.lang !== lang) { lang = b.dataset.lang; applyLang(); }
});
$("startBtn").onclick = () => { state.i = 0; renderCase(); };
$("replayBtn").onclick = () => {
  Object.assign(state, { i: 0, saved: 0, lost: 0, correct: 0, answered: 0, decided: false, lastChoice: null });
  renderCase();
};
$("caseActions").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-choice]");
  if (btn) decide(btn.dataset.choice);
});

// Boot
buildProgress();
show("introScreen");
applyLang();
</script>
</body>
</html>
