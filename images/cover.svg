  <text x="80" y="590" font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="2" fill="#7a7063">A vertical slice · The Demo Jam 2026 · vibe-coded with Claude Code</text>
  <text x="1120" y="590" text-anchor="end" font-family="ui-monospace, monospace" font-size="18" fill="#9c7320">No. 01 — NIGHT SHIFT</text>
