<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="Georgia, 'Songti SC', serif">
  <!-- paper -->
  <rect width="1200" height="675" fill="#f3ede1"/>
  <rect x="28" y="28" width="1144" height="619" fill="#fbf7ee" stroke="#d8cdb9"/>

  <!-- masthead rules -->
  <g stroke="#1c1813">
    <line x1="80" y1="120" x2="1120" y2="120" stroke-width="1"/>
    <line x1="80" y1="210" x2="1120" y2="210" stroke-width="1"/>
    <line x1="80" y1="216" x2="1120" y2="216" stroke-width="3"/>
  </g>

  <!-- kickers -->
  <text x="80" y="104" font-family="Inter, Arial, sans-serif" font-size="20" letter-spacing="5" fill="#7a7063">AN INTERACTIVE DOSSIER · 互动反诈调查档案</text>
  <text x="1120" y="104" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="20" letter-spacing="5" fill="#a72b22">THIS IS A DEMO</text>

  <!-- wordmark -->
  <text x="600" y="192" text-anchor="middle" font-size="78" font-weight="900" fill="#1c1813" letter-spacing="-1">THE FRAUD <tspan font-style="italic" font-weight="500" fill="#a72b22">DESK</tspan></text>
