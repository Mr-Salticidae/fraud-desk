  <!-- bottom rule + colophon -->
  <line x1="74" y1="612" x2="1126" y2="612" stroke="#d8cdb9" stroke-width="1"/>
  <text x="74" y="638" font-family="'Inter', Arial, sans-serif" font-size="14" letter-spacing="2" fill="#7a7063">A vertical slice · The Demo Jam 2026 · vibe-coded with Claude Code</text>
  <text x="1126" y="638" text-anchor="end" font-family="ui-monospace, 'Courier New', monospace" font-size="14" fill="#9c7320">No. 01 — NIGHT SHIFT</text>
</svg>
