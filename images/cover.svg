  <!-- headline -->
  <text x="80" y="372" font-size="62" font-weight="900" fill="#1c1813" letter-spacing="-1">Spot the scam.</text>
  <text x="80" y="442" font-size="62" font-weight="900" fill="#1c1813" letter-spacing="-1">Save the savings.</text>
  <text x="80" y="506" font-size="26" font-family="Inter, Arial, sans-serif" fill="#7a7063">五十秒一桩 · 中国高发电诈剧本 · 中英双语 · 点开即玩</text>

  <!-- rubber stamp -->
  <g transform="translate(940 430) rotate(-9)" fill="none">
    <rect x="-118" y="-46" width="236" height="92" rx="6" stroke="#a72b22" stroke-width="6" opacity="0.92"/>
    <rect x="-110" y="-38" width="220" height="76" rx="3" stroke="#a72b22" stroke-width="2" opacity="0.45"/>
    <text x="0" y="20" text-anchor="middle" font-size="58" font-weight="900" fill="#a72b22" letter-spacing="3" opacity="0.92">FRAUD</text>
  </g>

